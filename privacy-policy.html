    <h1>Privacy Policy</h1>
    <p>Last updated: March 25, 2026</p>
  </div>

  <div class="content">

    <h2>1. Introduction</h2>
    <p>ANX Home Healthcare and ANX Hospice Care ("ANX," "we," "us," or "our") is committed to protecting the privacy of patients, family members, healthcare partners, and all users of our Intake Referral Management System. This Privacy Policy explains how we collect, use, disclose, and safeguard your information.</p>

    <h2>2. Information We Collect</h2>
    <p>We may collect the following categories of information:</p>
    <ul>
      <li><strong>Personal Information:</strong> Name, email address, phone number, mailing address.</li>
      <li><strong>Protected Health Information (PHI):</strong> Date of birth, Social Security number, medical record numbers, diagnosis codes (ICD-10), insurance information, and clinical assessment data — all encrypted at rest using AES-256-GCM.</li>
      <li><strong>Usage Data:</strong> Log data, device information, IP addresses, and interaction data with our platform.</li>
      <li><strong>Communication Data:</strong> SMS messages, email correspondence, and notification preferences.</li>
    </ul>

    <h2>3. How We Use Your Information</h2>
    <p>We use collected information to:</p>
    <ul>
      <li>Manage and coordinate patient referrals through the intake process.</li>
      <li>Send SMS and email notifications regarding referral status updates.</li>
      <li>Communicate with healthcare partners about patient care coordination.</li>
      <li>Verify insurance eligibility and process clinical assessments.</li>
      <li>Maintain audit logs for regulatory compliance.</li>
      <li>Improve our services and user experience.</li>
    </ul>

    <h2>4. SMS/Text Message Communications</h2>
    <p>By providing your phone number and consenting to receive text messages, you agree to receive automated SMS notifications related to your referral status. Messages may include referral confirmations, stage transition updates, appointment reminders, and care coordination alerts.</p>
    <ul>
      <li>Message frequency varies based on referral activity.</li>
      <li>Message and data rates may apply.</li>
      <li>You may opt out at any time by replying <strong>STOP</strong> to any message.</li>
      <li>For help, reply <strong>HELP</strong> or contact us at the information below.</li>
      <li>Your phone number and SMS consent will not be shared with third parties for marketing purposes.</li>
    </ul>

    <h2>5. Information Sharing</h2>
    <p>We do not sell, rent, or trade your personal information to third parties for marketing purposes. We may share information with:</p>
    <ul>
      <li><strong>Healthcare Partners:</strong> Hospitals, physician offices, and other care providers involved in your referral, as necessary for care coordination.</li>
      <li><strong>Service Providers:</strong> Third-party vendors who assist in operating our platform (e.g., cloud hosting, SMS delivery), bound by confidentiality agreements.</li>
      <li><strong>Legal Requirements:</strong> When required by law, regulation, or legal process.</li>
    </ul>

    <h2>6. Data Security</h2>
    <p>We implement industry-standard security measures to protect your information:</p>
    <ul>
      <li>AES-256-GCM encryption for all Protected Health Information at rest.</li>
      <li>TLS encryption for all data in transit.</li>
      <li>Role-based access controls (RBAC) limiting data access to authorized personnel.</li>
      <li>Comprehensive audit logging of all data access and modifications.</li>
      <li>Multi-tenant data isolation ensuring organizational boundaries.</li>
    </ul>

    <h2>7. Data Retention</h2>
    <p>We retain personal information and PHI for as long as necessary to fulfill the purposes outlined in this policy, comply with legal obligations, and resolve disputes. When no longer needed, data is securely deleted or anonymized.</p>

    <h2>8. Your Rights</h2>
    <p>Depending on your jurisdiction, you may have the right to:</p>
    <ul>
      <li>Access the personal information we hold about you.</li>
      <li>Request correction of inaccurate information.</li>
      <li>Request deletion of your information (subject to legal retention requirements).</li>
      <li>Opt out of SMS and email communications.</li>
      <li>Receive a copy of your data in a portable format.</li>
    </ul>

    <h2>9. HIPAA Compliance</h2>
    <p>For users covered under the Health Insurance Portability and Accountability Act (HIPAA), we maintain administrative, physical, and technical safeguards to protect PHI in accordance with HIPAA regulations. Our system is designed with HIPAA compliance as a core requirement.</p>

    <h2>10. Changes to This Policy</h2>
    <p>We may update this Privacy Policy from time to time. Changes will be posted on this page with an updated "Last updated" date. Continued use of our services after changes constitutes acceptance of the updated policy.</p>

    <h2>11. Contact Us</h2>

    </p>
